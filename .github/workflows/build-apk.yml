name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: |
          mkdir temp-gradle
          touch temp-gradle/settings.gradle
          cd temp-gradle
          gradle wrapper --gradle-version 8.2
          cd ..
          cp temp-gradle/gradlew .
          cp temp-gradle/gradlew.bat .
          mkdir -p gradle/wrapper
          cp temp-gradle/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/
          cp temp-gradle/gradle/wrapper/gradle-wrapper.properties gradle/wrapper/
          rm -rf temp-gradle

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100px" height="100px">
  <!-- Rounded retro flip card container -->
  <rect x="15" y="10" width="70" height="80" rx="12" fill="#1c1d1f" stroke="#2e3033" stroke-width="2" />
  
  <!-- Top half darker background -->
  <path d="M15 10 h70 v40 h-70 Z" fill="#121314" clip-path="inset(0 0 0 0 round 12px 12px 0 0)" />
  
  <!-- Inner split hinge line shadow -->
  <line x1="15" y1="50" x2="85" y2="50" stroke="#000" stroke-width="3" />
  <line x1="15" y1="50" x2="85" y2="50" stroke="#121314" stroke-width="1" />
  
  <!-- Metal hinges on the left and right sides of the hinge line -->
  <rect x="12" y="44" width="6" height="12" rx="1.5" fill="#0d0e0f" stroke="#27272a" stroke-width="0.5" />
  <rect x="82" y="44" width="6" height="12" rx="1.5" fill="#0d0e0f" stroke="#27272a" stroke-width="0.5" />
  
  <!-- Font display of K (Split in the middle) -->
  <!-- Top half of K -->
  <path d="M38 24 v24 M58 24 L42 43 M46 38 L58 48" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
  <path d="M38 24 v24 M58 24 L42 43 M46 38 L58 48" fill="none" stroke="#fbbf24" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Bottom half of K -->
  <path d="M38 52 v24 M42 52 L58 76" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
  <path d="M38 52 v24 M42 52 L58 76" fill="none" stroke="#fbbf24" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Subtle screen glare/gradient reflection -->
  <path d="M20 15 L80 15 L25 45 Z" fill="url(#glare-gradient)" opacity="0.08" />
  
  <defs>
    <linearGradient id="glare-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>
